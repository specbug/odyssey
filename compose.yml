name: odyssey

services:
  api:
    build: ./apps/api
    restart: always
    volumes:
      - odyssey-data:/data
    environment:
      UPLOAD_DIR: /data/uploads
      DATABASE_URL: sqlite:////data/odyssey.db
      RELOAD: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-https://odyssey.sixeleven.in}
    ports:
      - "8000:8000"   # Mac app still reaches API at localhost:8000

  web:
    build: ./apps/webapp
    restart: always
    ports:
      - "3000:80"     # Local LAN access at http://localhost:3000
    depends_on:
      - api

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    # Tunnel ingress must be configured in the Cloudflare dashboard to route to http://web:80
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - web

volumes:
  odyssey-data:
    name: odyssey-data   # Global name (no project prefix) so other compose stacks (backupd) can mount it
